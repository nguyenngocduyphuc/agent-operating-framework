# AOF CI — ruff + pytest matrix (matches local quality bar).

name: AOF

on:
  push:
    branches: ['**']
    paths:
      - 'core/**'
      - 'adapters/**'
      - 'examples/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/aof.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'adapters/**'
      - 'examples/**'
      - 'tests/**'
      - 'scripts/**'
      - 'pyproject.toml'
      - 'README.md'
      - '.github/workflows/aof.yml'

jobs:
  quality:
    name: ruff-pytest
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install tools
        run: python -m pip install --upgrade pip ruff pytest
      - name: Lint
        run: ruff check core/ tests/
      - name: Tests
        run: python -m pytest tests/ -q
      - name: MCP tools list smoke
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/ci_tools_list_smoke.py

  demo:
    name: demo-smoke
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Full-flow demo dry
        run: python examples/full_flow_demo.py
