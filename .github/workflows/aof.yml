# AOF CI — preflight, quality, and demo smoke-test
# Runs on push/PR to any branch touching core/, adapters/, examples/, or this workflow.

name: AOF

on:
  push:
    paths:
      - 'core/**'
      - 'adapters/**'
      - 'examples/**'
      - 'tests/**'
      - 'README.md'
      - '.github/workflows/aof.yml'
  pull_request:
    paths:
      - 'core/**'
      - 'adapters/**'
      - 'examples/**'
      - 'tests/**'
      - 'README.md'
      - '.github/workflows/aof.yml'

jobs:
  preflight:
    name: Preflight gate
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run preflight
        run: python -m core.preflight --json

  quality:
    name: Code quality (ruff)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install ruff
        run: python -m pip install --upgrade ruff
      - name: Lint with ruff
        run: ruff check --select F core/ examples/full_flow_demo.py

  demo:
    name: Demo smoke-test
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Run full-flow demo (dry, no tracker token)
        run: python examples/full_flow_demo.py

  tests:
    name: Regression tests (pytest)
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
      - name: Install pytest
        run: python -m pip install --upgrade pytest
      - name: Run tests
        run: python -m pytest tests/ -q
